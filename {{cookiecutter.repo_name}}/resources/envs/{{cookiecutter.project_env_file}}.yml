name: {{cookiecutter.project_env_name}}
channels:
  - anaconda
  - conda-forge
dependencies:
  - python=3.11
  - build
  - bumpver
{%- if cookiecutter.pre_commit == "yes" %}
  - conda-forge::pre-commit
{%- endif %}
  - pytest
  - pytest-cov
  - ruff
{%- if cookiecutter.sphinx_docs == "yes" %}
  - sphinx
  - {{ cookiecutter.sphinx_theme }}
{%- endif %}
  - pip
