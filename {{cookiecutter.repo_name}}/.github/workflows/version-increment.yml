# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Version Increment

on:
  push:
    branches:
      - master
      - release-candidate

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set GIT Config
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
          git config --global user.name "$(gh api /users/${GITHUB_ACTOR} | jq .name -r)"
          git config -l
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install bumpver
          # if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Increase Version
        run: |
          CURRENT_BRANCH=$(echo "${GITHUB_REF##*/}")
          echo "Current branch: $CURRENT_BRANCH"

          if [ "$CURRENT_BRANCH" = "main" ]; then
            echo "Merge to main detected — bumping patch and tagging..."
            
            # Read current version
            CURRENT_VERSION=$(sed -n 's/current_version = "\(.*\)"/\1/p' pyproject.toml | tr -d '[:space:]')
            echo "Current version: $CURRENT_VERSION"

            # Extract parts
            CURRENT_YEAR=$(echo "$CURRENT_VERSION" | cut -d'.' -f1)
            CURRENT_MONTH=$(echo "$CURRENT_VERSION" | cut -d'.' -f2)
            CURRENT_PATCH=$(echo "$CURRENT_VERSION" | cut -d'.' -f3)
            NEXT_PATCH=$(printf "%02d" $((10#$CURRENT_PATCH + 1)))  # 0-padded
            NEW_VERSION="$CURRENT_YEAR.$CURRENT_MONTH.$NEXT_PATCH.0"
            echo "New version: $NEW_VERSION"

            bumpver update --set-version "$NEW_VERSION"

          else
            echo "Regular push — bumping INC0 only"
            bumpver update --no-tag-commit
          fi
